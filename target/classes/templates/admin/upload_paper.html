<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Paper - Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .main-content { margin-left: 250px; padding: 2rem; }
    </style>
</head>
<body>

    <!-- Include Sidebar -->
    <div th:replace="~{admin/fragments :: sidebar('upload')}"></div>

    <div class="main-content">
        <h3 class="fw-bold text-primary mb-4">Upload Question Paper</h3>

        <div class="card shadow-sm border-0 rounded-3 max-w-75">
            <div class="card-body p-4">
                <form th:action="@{/admin/upload-paper}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
                    
                    <div class="row g-3">
                        <!-- Subject -->
                        <div class="col-md-6">
                            <label for="subject" class="form-label fw-semibold">Subject Name</label>
                            <input type="text" class="form-control" id="subject" name="subject" placeholder="e.g. Advanced Java" required>
                            <div class="invalid-feedback">Please provide a subject name.</div>
                        </div>

                        <!-- Course -->
                        <div class="col-md-6">
                            <label for="course" class="form-label fw-semibold">Course Name</label>
                            <input type="text" class="form-control" id="course" name="course" placeholder="e.g. BCA / MCA" required>
                            <div class="invalid-feedback">Please provide a course name.</div>
                        </div>

                        <!-- Semester -->
                        <div class="col-md-6">
                            <label for="semester" class="form-label fw-semibold">Semester</label>
                            <select class="form-select" id="semester" name="semester" required>
                                <option value="" selected disabled>Select Semester</option>
                                <option value="1">Semester 1</option>
                                <option value="2">Semester 2</option>
                                <option value="3">Semester 3</option>
                                <option value="4">Semester 4</option>
                                <option value="5">Semester 5</option>
                                <option value="6">Semester 6</option>
                            </select>
                            <div class="invalid-feedback">Please select a semester.</div>
                        </div>

                        <!-- File Upload -->
                        <div class="col-12 mt-4">
                            <label for="paperFile" class="form-label fw-semibold">Upload Paper File (PDF/Word)</label>
                            <input class="form-control form-control-lg" type="file" id="paperFile" name="file" accept=".pdf,.doc,.docx" required>
                            <div class="form-text text-muted">Max file size: 5MB. Accepted formats: .pdf, .docx</div>
                            <div class="invalid-feedback">Please upload the paper document.</div>
                        </div>
                    </div>

                    <div class="mt-4 text-end">
                        <button type="reset" class="btn btn-light me-2">Clear</button>
                        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-cloud-arrow-up me-2"></i> Upload Paper</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Bootstrap Validation
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
