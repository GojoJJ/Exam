<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submissions - Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .main-content { margin-left: 250px; padding: 2rem; }
    </style>
</head>
<body>

    <!-- Include Sidebar -->
    <div th:replace="~{admin/fragments :: sidebar('submissions')}"></div>

    <div class="main-content">
        <h3 class="fw-bold text-primary mb-4">Student Submissions</h3>

        <!-- Filters Section -->
        <div class="card shadow-sm border-0 rounded-3 mb-4">
            <div class="card-body">
                <form class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Course</label>
                        <select class="form-select">
                            <option value="">All Courses</option>
                            <option value="BCA">BCA</option>
                            <option value="MCA">MCA</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Semester</label>
                        <select class="form-select">
                            <option value="">All Semesters</option>
                            <option value="1">Sem 1</option>
                            <option value="2">Sem 2</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">Division</label>
                        <select class="form-select">
                            <option value="">All Divisions</option>
                            <option value="A">Division A</option>
                            <option value="B">Division B</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary w-100"><i class="bi bi-funnel me-2"></i> Filter</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Section -->
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="px-4 py-3">Enrollment No</th>
                            <th class="py-3">Student Name</th>
                            <th class="py-3">Course & Sem</th>
                            <th class="py-3">Subject</th>
                            <th class="py-3">Status</th>
                            <th class="px-4 py-3 text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sub : ${submissions}">
                            <td class="px-4 py-3" th:text="${sub.student != null ? sub.student.enrollmentNo : 'N/A'}">2023BCA001</td>
                            <td class="py-3 fw-bold">Student Name</td>
                            <td class="py-3" th:text="${sub.paper != null ? (sub.paper.course + ' - Sem ' + sub.paper.semester) : 'N/A'}">BCA - Sem 3</td>
                            <td class="py-3" th:text="${sub.paper != null ? sub.paper.subject : 'N/A'}">Advanced Java</td>
                            <td class="py-3">
                                <span class="badge" th:classappend="${sub.status == 'Pending'} ? 'bg-warning text-dark' : 'bg-success'" th:text="${sub.status}">Pending</span>
                            </td>
                            <td class="px-4 py-3 text-end">
                                <a th:href="@{/admin/evaluate(id=${sub.id})}" class="btn btn-sm" th:classappend="${sub.status == 'Pending'} ? 'btn-outline-primary' : 'btn-outline-secondary'" th:text="${sub.status == 'Pending' ? 'Evaluate' : 'View Result'}">Evaluate</a>
                            </td>
                        </tr>
                        <tr th:if="${submissions == null or submissions.isEmpty()}">
                            <td colspan="6" class="text-center py-4 text-muted">No submissions found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
