<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Extracted Questions - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #333; }
        
        /* Sticky Header */
        .sticky-top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e3e6f0;
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        /* Card Layout */
        .question-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.2s ease-in-out;
            position: relative;
            border-left: 5px solid #28a745; /* Default Green for Valid */
        }
        .question-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .question-card.invalid-question { border-left-color: #dc3545; background-color: #fff8f8; }

        /* Accordion Sections */
        .section-header {
            background: #eef2f5;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-container { margin-bottom: 30px; }
        
        /* Form Controls */
        .form-label { font-weight: 600; font-size: 0.9rem; color: #555; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; }
        .form-control:focus, .form-select:focus { border-color: #4a90e2; box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.25); }
        
        .btn-custom { border-radius: 8px; font-weight: 600; padding: 8px 20px; }
        .btn-delete { color: #dc3545; background: #fff; border: 1px solid #dc3545; border-radius: 8px; padding: 6px 12px; transition: 0.2s; }
        .btn-delete:hover { background: #dc3545; color: #fff; }

        .stat-badge { font-size: 0.95rem; padding: 8px 12px; border-radius: 6px; }
    </style>
</head>
<body>

<form id="questionsForm" th:action="@{/admin/paper/{id}/confirm-questions(id=${paper.id})}" method="POST">
    
    <!-- Sticky Header -->
    <div class="sticky-top-bar d-flex justify-content-between align-items-center">
        <div>
            <h4 class="m-0 fw-bold text-dark"><i class="fas fa-tasks me-2 text-primary"></i> Review Extracted Questions</h4>
            <small class="text-muted">Review, clean, and organize questions before saving.</small>
        </div>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-warning btn-custom" onclick="autoAssignMarks()"><i class="fas fa-check-circle me-1"></i> Auto Assign Marks</button>
            <button type="button" class="btn btn-outline-primary btn-custom" onclick="autoClean()"><i class="fas fa-magic me-1"></i> Auto Clean</button>
            <button type="button" class="btn btn-outline-danger btn-custom" onclick="deleteSelected()"><i class="fas fa-trash me-1"></i> Delete Selected</button>
            <a href="/admin/dashboard" class="btn btn-outline-secondary btn-custom">Cancel</a>
            <button type="submit" class="btn btn-primary btn-custom shadow"><i class="fas fa-save me-1"></i> Save All Questions</button>
        </div>
    </div>

    <div class="container pb-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <span class="badge bg-primary stat-badge me-2">Paper: <span th:text="${paper.subject}"></span></span>
                <span class="badge bg-success stat-badge" id="totalCountBadge"><span th:text="${questions.size()}"></span> Questions Extracted</span>
            </div>
            <div>
                <span class="badge bg-light text-dark border"><i class="fas fa-circle text-success me-1"></i> Valid</span>
                <span class="badge bg-light text-dark border ms-2"><i class="fas fa-circle text-danger me-1"></i> Needs Review</span>
            </div>
        </div>

        <div id="questionsContainer">
            <!-- Hidden original list to be JS-parsed and grouped -->
            <div id="originalQuestions" style="display:none;">
                <div th:each="q, stat : ${questions}" class="raw-question-data"
                     th:data-group="${q.questionGroup}"
                     th:data-marks="${q.marks}"
                     th:data-optional="${q.isOptional}"
                     th:data-text="${q.text}">
                </div>
            </div>
            <!-- Dynamic Sections will be injected here by JS -->
        </div>

    </div>
</form>

<script>
    const filterKeywords = ["instructions", "attempt all questions", "university", "subject name", "duration", "attempt any"];
    
    document.addEventListener("DOMContentLoaded", function() {
        const rawQuestions = document.querySelectorAll('.raw-question-data');
        let questions = [];
        
        rawQuestions.forEach((el, index) => {
            questions.push({
                id: index,
                group: el.getAttribute('data-group') || 'Q1',
                marks: el.getAttribute('data-marks') || '1.0',
                isOptional: el.getAttribute('data-optional') === 'true',
                text: el.getAttribute('data-text') || ''
            });
        });

        renderGroupedQuestions(questions);
    });

    function isInvalidText(text) {
        const lowerText = text.toLowerCase();
        return filterKeywords.some(kw => lowerText.includes(kw));
    }

    function renderGroupedQuestions(questions) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = ''; // Clear container

        // Group by 'group'
        const groups = {};
        questions.forEach(q => {
            if (!groups[q.group]) groups[q.group] = [];
            groups[q.group].push(q);
        });

        // Sort group keys Q1, Q2...
        const sortedGroups = Object.keys(groups).sort();

        sortedGroups.forEach(groupName => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section-container';

            // Section Header
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `
                <span><i class="fas fa-layer-group text-primary me-2"></i> Section ${groupName} <span class="badge bg-secondary ms-2">${groups[groupName].length} Items</span></span>
                <i class="fas fa-chevron-down toggle-icon"></i>
            `;
            header.onclick = function() {
                const body = sectionDiv.querySelector('.section-body');
                const icon = sectionDiv.querySelector('.toggle-icon');
                if (body.style.display === 'none') {
                    body.style.display = 'block';
                    icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
                } else {
                    body.style.display = 'none';
                    icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
                }
            };
            sectionDiv.appendChild(header);

            // Section Body
            const body = document.createElement('div');
            body.className = 'section-body';
            
            groups[groupName].forEach((q, indexInGroup) => {
                const isInvalid = isInvalidText(q.text);
                const card = document.createElement('div');
                card.className = `question-card ${isInvalid ? 'invalid-question' : ''}`;
                card.dataset.id = q.id;

                card.innerHTML = `
                    <div class="row align-items-center mb-3">
                        <div class="col-md-1 d-flex justify-content-center">
                            <input class="form-check-input bulk-select-chk shadow-sm" type="checkbox" value="${q.id}" style="transform: scale(1.3); cursor: pointer;">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Section</label>
                            <select class="form-select q-group shadow-sm">
                                <option value="Q1" ${q.group === 'Q1' ? 'selected' : ''}>Q1</option>
                                <option value="Q2" ${q.group === 'Q2' ? 'selected' : ''}>Q2</option>
                                <option value="Q3" ${q.group === 'Q3' ? 'selected' : ''}>Q3</option>
                                <option value="Q4" ${q.group === 'Q4' ? 'selected' : ''}>Q4</option>
                                <option value="Q5" ${q.group === 'Q5' ? 'selected' : ''}>Q5</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Marks</label>
                            <input type="number" step="0.5" class="form-control q-marks shadow-sm" value="${q.marks}" required>
                        </div>
                        <div class="col-md-3 d-flex align-items-end pb-2">
                            <div class="form-check">
                                <input class="form-check-input q-optional shadow-sm" type="checkbox" ${q.isOptional ? 'checked' : ''} style="cursor: pointer;">
                                <label class="form-check-label text-warning fw-bold ms-1" style="cursor: pointer;">Optional (OR)</label>
                            </div>
                        </div>
                        <div class="col-md-4 text-end">
                            <button type="button" class="btn-delete" onclick="deleteQuestion(this)"><i class="fas fa-trash-alt"></i> Delete</button>
                        </div>
                    </div>
                    
                    <div class="mb-2 px-3">
                        <label class="form-label">Question Text ${isInvalid ? '<span class="text-danger ms-2"><i class="fas fa-exclamation-triangle"></i> Contains review keywords</span>' : ''}</label>
                        <textarea class="form-control q-text shadow-sm" rows="3" required>${q.text}</textarea>
                    </div>
                `;
                body.appendChild(card);
            });

            sectionDiv.appendChild(body);
            container.appendChild(sectionDiv);
        });
        
        updateTotalCount();
    }

    function deleteQuestion(btn) {
        const card = btn.closest('.question-card');
        card.style.opacity = '0';
        setTimeout(() => {
            card.remove();
            updateTotalCount();
        }, 200);
    }

    function deleteSelected() {
        const checkboxes = document.querySelectorAll('.bulk-select-chk:checked');
        if (checkboxes.length === 0) {
            alert('Please select questions to delete.');
            return;
        }
        if (confirm(`Are you sure you want to delete ${checkboxes.length} selected questions?`)) {
            checkboxes.forEach(chk => {
                chk.closest('.question-card').remove();
            });
            updateTotalCount();
        }
    }

    function autoClean() {
        let removedCount = 0;
        const cards = document.querySelectorAll('.question-card');
        cards.forEach(card => {
            const text = card.querySelector('.q-text').value;
            if (isInvalidText(text)) {
                card.remove();
                removedCount++;
            }
        });
        updateTotalCount();
        if (removedCount > 0) {
            alert(`Auto Clean removed ${removedCount} instruction-type lines.`);
        } else {
            alert(`No invalid lines found to clean.`);
        }
    }

    function autoAssignMarks() {
        const marks = prompt("Enter marks to assign to ALL remaining questions:", "1.0");
        if (marks && !isNaN(marks)) {
            document.querySelectorAll('.q-marks').forEach(input => {
                input.value = marks;
            });
        }
    }

    function updateTotalCount() {
        const total = document.querySelectorAll('.question-card').length;
        document.getElementById('totalCountBadge').innerHTML = `${total} Questions Extracted`;
        
        // Remove empty sections
        document.querySelectorAll('.section-container').forEach(sec => {
            if (sec.querySelectorAll('.question-card').length === 0) {
                sec.remove();
            } else {
                // Update badge in section header
                const badge = sec.querySelector('.section-header .badge');
                if (badge) badge.innerText = `${sec.querySelectorAll('.question-card').length} Items`;
            }
        });
    }

    // On Form Submit: Re-index all elements so backend 'while' loop works cleanly
    document.getElementById('questionsForm').addEventListener('submit', function(e) {
        // Remove old hidden inputs if any
        document.querySelectorAll('.dynamic-input').forEach(el => el.remove());

        const cards = document.querySelectorAll('.question-card');
        let isValid = true;

        if (cards.length === 0) {
            e.preventDefault();
            alert("No questions to save! Please extract again or add questions manually.");
            return;
        }

        cards.forEach((card, index) => {
            const group = card.querySelector('.q-group').value;
            const marks = card.querySelector('.q-marks').value;
            const optional = card.querySelector('.q-optional').checked;
            const text = card.querySelector('.q-text').value.trim();

            if (!text || !marks) {
                isValid = false;
                card.style.borderLeftColor = '#dc3545'; // Highlight red
            }

            // Create hidden inputs for the backend mapping
            this.appendChild(createHiddenInput(`q_${index}_group`, group));
            this.appendChild(createHiddenInput(`q_${index}_marks`, marks));
            if (optional) {
                this.appendChild(createHiddenInput(`q_${index}_optional`, 'on'));
            }
            this.appendChild(createHiddenInput(`q_${index}_text`, text));
        });

        if (!isValid) {
            e.preventDefault();
            alert("Validation Failed! Please fill out all Question Texts and Marks before saving.");
        }
    });

    function createHiddenInput(name, value) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = name;
        input.value = value;
        input.className = 'dynamic-input';
        return input;
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
