<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Sidebar Fragment -->
<div th:fragment="sidebar(activeMenu)">
    <!-- Google Fonts & Bootstrap Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --sidebar-width: 280px;
            --sidebar-bg: #090d16;
            --sidebar-border: #141b2b;
            --sidebar-hover: #162035;
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --glow-color: rgba(99, 102, 241, 0.45);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Outfit', sans-serif !important;
        }

        .admin-sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 1050;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1.25rem;
            transition: var(--transition-smooth);
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.15);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.5rem 1.5rem 0.5rem;
            border-bottom: 1px solid var(--sidebar-border);
            margin-bottom: 1.5rem;
        }

        .brand-logo-container {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-profile {
            background: #0f1524;
            border: 1px solid var(--sidebar-border);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            transition: var(--transition-smooth);
        }

        .sidebar-profile:hover {
            border-color: #1d2843;
            transform: translateY(-2px);
        }

        .profile-avatar-container {
            position: relative;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.25rem;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border: 2px solid var(--sidebar-bg);
            border-radius: 50%;
            position: absolute;
            bottom: -2px;
            right: -2px;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }
            70% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .profile-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #f8fafc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-role {
            font-size: 0.75rem;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .menu-item-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 12px;
            transition: var(--transition-smooth);
            border: 1px solid transparent;
        }

        .menu-item-link i {
            font-size: 1.2rem;
            transition: var(--transition-smooth);
        }

        .menu-item-link:hover {
            color: #f8fafc;
            background-color: var(--sidebar-hover);
            transform: translateX(4px);
        }

        .menu-item-link.active {
            color: #ffffff;
            background: var(--primary-gradient);
            box-shadow: 0 4px 20px var(--glow-color);
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-item-link.active i {
            transform: scale(1.1);
            color: #ffffff;
        }

        .menu-item-logout {
            margin-top: auto;
            border-top: 1px solid var(--sidebar-border);
            padding-top: 1.5rem;
        }

        .logout-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1rem;
            color: #f43f5e;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            transition: var(--transition-smooth);
        }

        .logout-link:hover {
            background-color: rgba(244, 63, 94, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.08);
        }
    </style>

    <aside class="admin-sidebar">
        <!-- Brand Header -->
        <div class="sidebar-brand">
            <div class="brand-logo-container">
                <img th:src="@{${logoUrl}}" alt="Logo" style="max-height: 100%; max-width: 100%; object-fit: contain;">
            </div>
            <span class="brand-name">Exam Admin</span>
        </div>
        
        <!-- User Profile Card -->
        <div class="sidebar-profile">
            <div class="profile-avatar-container">
                <div class="profile-avatar">
                    <span th:text="${#strings.substring(adminName, 0, 1)}">A</span>
                </div>
                <div class="status-indicator"></div>
            </div>
            <div class="profile-info">
                <span class="profile-name" th:text="${adminName}">Super Admin</span>
                <span class="profile-role">Administrator</span>
            </div>
        </div>

        <!-- Navigation Menu -->
        <ul class="sidebar-menu">
            <li>
                <a th:href="@{/admin/dashboard}" class="menu-item-link" th:classappend="${activeMenu == 'dashboard'} ? 'active' : ''">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a th:href="@{/admin/upload-paper}" class="menu-item-link" th:classappend="${activeMenu == 'upload'} ? 'active' : ''">
                    <i class="bi bi-cloud-arrow-up-fill"></i>
                    <span>Upload Paper</span>
                </a>
            </li>
            <li>
                <a th:href="@{/admin/submissions}" class="menu-item-link" th:classappend="${activeMenu == 'submissions'} ? 'active' : ''">
                    <i class="bi bi-file-earmark-check-fill"></i>
                    <span>Submissions</span>
                </a>
            </li>
            <li>
                <a th:href="@{/admin/results}" class="menu-item-link" th:classappend="${activeMenu == 'results'} ? 'active' : ''">
                    <i class="bi bi-award-fill"></i>
                    <span>Results</span>
                </a>
            </li>
        </ul>

        <!-- Logout Action -->
        <div class="menu-item-logout">
            <a th:href="@{/admin-login}" class="logout-link">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign Out</span>
            </a>
        </div>
    </aside>
</div>

</body>
</html>
