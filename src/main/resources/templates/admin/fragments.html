<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- Sidebar Fragment -->
<div th:fragment="sidebar(activeMenu)" class="sidebar bg-dark text-white p-3 h-100" style="min-width: 250px; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;">
    <div class="text-center mb-4">
        <img th:src="@{${logoUrl}}" alt="Logo" style="max-width: 80px; background: white; padding: 5px; border-radius: 5px;">
        <h5 class="mt-2 text-uppercase font-weight-bold">Exam Admin</h5>
    </div>
    
    <div class="mb-4 text-center pb-3 border-bottom border-secondary">
        <i class="bi bi-person-circle fs-3 d-block mb-1"></i>
        <span class="fw-bold" th:text="${adminName}">Admin Name</span>
    </div>

    <ul class="nav flex-column gap-2">
        <li class="nav-item">
            <a th:href="@{/admin/dashboard}" class="nav-link text-white rounded" th:classappend="${activeMenu == 'dashboard'} ? 'bg-primary' : ''">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/upload-paper}" class="nav-link text-white rounded" th:classappend="${activeMenu == 'upload'} ? 'bg-primary' : ''">
                <i class="bi bi-cloud-arrow-up me-2"></i> Upload Paper
            </a>
        </li>
        <li class="nav-item">
            <a th:href="@{/admin/submissions}" class="nav-link text-white rounded" th:classappend="${activeMenu == 'submissions'} ? 'bg-primary' : ''">
                <i class="bi bi-list-check me-2"></i> View Submissions
            </a>
        </li>
        <li class="nav-item mt-auto pt-4">
            <a th:href="@{/admin-login}" class="nav-link text-danger">
                <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
        </li>
    </ul>
</div>

</body>
</html>
