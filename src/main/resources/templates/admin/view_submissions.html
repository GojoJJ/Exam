<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions - Admin Dashboard</title>
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --sidebar-width: 280px;
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            --transition-smooth: all 0.2s ease-in-out;
        }

        body {
            background-color: var(--bg-canvas);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif !important;
            min-height: 100vh;
        }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 3rem;
            transition: var(--transition-smooth);
        }

        .page-header {
            margin-bottom: 2.5rem;
        }

        /* Filter Panel */
        .filter-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--card-shadow);
            margin-bottom: 2.5rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .form-select {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            transition: var(--transition-smooth);
        }

        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-filter {
            background: #f1f5f9;
            color: #334155;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.65rem 1.25rem;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .btn-filter:hover {
            background: #e2e8f0;
            color: #0f172a;
        }

        /* Data Card & Table */
        .data-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .table {
            margin-bottom: 0;
            vertical-align: middle;
        }

        .table thead th {
            background-color: #f8fafc;
            border-bottom: 1.5px solid #e2e8f0;
            color: #475569;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            padding: 1.25rem 1.5rem;
        }

        .table tbody td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            font-size: 0.95rem;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        .table tbody tr {
            transition: var(--transition-smooth);
        }

        .table tbody tr:hover {
            background-color: #fcfcff;
        }

        /* Enrollment Highlight */
        .enroll-no {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--primary);
            background-color: #eef2ff;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        /* Modern Badges */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background-color: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .status-evaluated {
            background-color: #d1fae5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        /* Actions */
        .btn-action-eval {
            background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
            color: white !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1.25rem;
            font-size: 0.85rem;
            border: none;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.15);
        }

        .btn-action-eval:hover {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 6px 15px rgba(79, 70, 229, 0.25);
            transform: translateY(-1px);
        }

        .btn-action-view {
            background: #ffffff;
            color: #475569 !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1.25rem;
            font-size: 0.85rem;
            border: 1px solid #cbd5e1;
            transition: var(--transition-smooth);
        }

        .btn-action-view:hover {
            background: #f1f5f9;
            color: #0f172a !important;
            border-color: #94a3b8;
        }

        @media (max-width: 991px) {
            .main-content {
                margin-left: 0;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Include Sidebar -->
    <div th:replace="~{admin/fragments :: sidebar('submissions')}"></div>

    <main class="main-content">
        <!-- Header -->
        <div class="page-header">
            <h2 class="fw-bold text-dark"><i class="bi bi-file-earmark-check-fill text-primary me-2"></i>Student Submissions</h2>
            <p class="text-muted mb-0">Monitor online exam submissions, analyze course outputs, and execute quick evaluations.</p>
        </div>

        <!-- Filters Section -->
        <div class="filter-card">
            <form th:action="@{/admin/submissions}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Course Name</label>
                    <select class="form-select" name="course">
                        <option value="">All Courses</option>
                        <option value="BCA" th:selected="${selectedCourse == 'BCA'}">BCA</option>
                        <option value="MCA" th:selected="${selectedCourse == 'MCA'}">MCA</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Academic Semester</label>
                    <select class="form-select" name="semester">
                        <option value="">All Semesters</option>
                        <option value="1" th:selected="${selectedSemester == '1'}">Sem 1</option>
                        <option value="2" th:selected="${selectedSemester == '2'}">Sem 2</option>
                        <option value="3" th:selected="${selectedSemester == '3'}">Sem 3</option>
                        <option value="4" th:selected="${selectedSemester == '4'}">Sem 4</option>
                        <option value="5" th:selected="${selectedSemester == '5'}">Sem 5</option>
                        <option value="6" th:selected="${selectedSemester == '6'}">Sem 6</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Division</label>
                    <select class="form-select" name="division">
                        <option value="">All Divisions</option>
                        <option value="A" th:selected="${selectedDivision == 'A'}">Division A</option>
                        <option value="B" th:selected="${selectedDivision == 'B'}">Division B</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn-filter"><i class="bi bi-funnel me-2"></i>Apply Filters</button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="data-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Enrollment No</th>
                            <th>Student Name</th>
                            <th>Course & Sem</th>
                            <th>Exam Subject</th>
                            <th>Evaluation Status</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="sub : ${submissions}">
                            <td>
                                <span class="enroll-no" th:text="${sub.student != null ? sub.student.enrollmentNo : 'N/A'}">2023BCA001</span>
                            </td>
                            <td class="fw-semibold text-dark" th:text="${sub.student != null ? (sub.student.name ?: 'Student Name') : 'Student Name'}">Student Name</td>
                            <td th:text="${sub.paper != null ? (sub.paper.course + ' - Sem ' + sub.paper.semester) : 'N/A'}">BCA - Sem 3</td>
                            <td class="fw-medium text-dark" th:text="${sub.paper != null ? sub.paper.subject : 'N/A'}">Advanced Java</td>
                            <td>
                                <span class="status-pill" 
                                      th:classappend="${sub.status == 'Pending'} ? 'status-pending' : 'status-evaluated'">
                                    <i class="bi" th:classappend="${sub.status == 'Pending'} ? 'bi-hourglass-split' : 'bi-check-circle-fill'"></i>
                                    <span th:text="${sub.status}">Pending</span>
                                </span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/admin/evaluate(id=${sub.id})}" 
                                   class="btn btn-sm" 
                                   th:classappend="${sub.status == 'Pending'} ? 'btn-action-eval' : 'btn-action-view'" 
                                   th:text="${sub.status == 'Pending' ? 'Evaluate' : 'View Result'}">Evaluate</a>
                            </td>
                        </tr>
                        <tr th:if="${submissions == null or submissions.isEmpty()}">
                            <td colspan="6" class="text-center py-5 text-muted">
                                <i class="bi bi-file-earmark-x d-block fs-1 mb-2 opacity-50"></i>
                                No submissions found in the database.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
