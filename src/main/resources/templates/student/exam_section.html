<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam Student Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0d6efd;
            --purple-banner: #6f42c1;
            --cyan-badge: #0dcaf0;
            --yellow-badge: #ffc107;
            --warning-soft: #fff3cd;
            --danger-soft: #f8d7da;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. Top Header */
        .top-header {
            background-color: white;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #dee2e6;
            z-index: 1050;
        }

        .student-badge {
            font-weight: 700;
            font-size: 1rem;
            color: #212529;
        }

        .pill-timer {
            background-color: #212529;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 2. Secondary Info Bar */
        .info-bar {
            background-color: #e9ecef;
            padding: 6px 24px;
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
            border-bottom: 1px solid #dee2e6;
        }

        .info-item { display: flex; align-items: center; gap: 6px; }

        /* 3. Main Layout Grid */
        .main-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar - Exam Navigator */
        .sidebar-navigator {
            width: 300px;
            background-color: white;
            border-right: 1px solid #dee2e6;
            padding: 24px;
            overflow-y: auto;
        }

        .navigator-card {
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 16px;
            background: white;
        }

        .navigator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #212529;
        }

        .section-list { display: flex; flex-direction: column; gap: 10px; }

        .section-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }

        .section-item:active { transform: scale(0.98); }

        .section-active {
            background-color: var(--warning-soft);
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .section-inactive {
            background-color: var(--danger-soft);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Right Column - Question Area */
        .question-area {
            flex: 1;
            padding: 24px 40px;
            overflow-y: auto;
            background-color: var(--bg-light);
        }

        .area-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .question-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .purple-banner {
            background-color: var(--purple-banner);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .question-item {
            padding: 30px;
            border-bottom: 1px solid #f1f3f5;
        }

        .q-num-badge {
            width: 32px;
            height: 32px;
            background: #f1f3f5;
            color: #495057;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .question-text {
            font-weight: 700;
            font-size: 1.2rem;
            color: #212529;
            margin-bottom: 20px;
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .type-cyan { background-color: #e0f7fa; color: #00838f; border: 1px solid #b2ebf2; }
        .marks-yellow { background-color: #fffde7; color: #f9a825; border: 1px solid #fff9c4; }

        .answer-textarea {
            width: 100%;
            min-height: 250px;
            border: 1px solid #dee2e8;
            border-radius: 12px;
            padding: 20px;
            font-size: 1.05rem;
            margin-top: 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #fdfdfd;
        }

        .answer-textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        }

        .char-helper {
            font-size: 0.8rem;
            color: #adb5bd;
            margin-top: 8px;
            font-weight: 600;
        }

        /* 4. Sticky Bottom Footer */
        .sticky-footer {
            background-color: white;
            border-top: 1px solid #dee2e6;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1050;
        }

        .btn-footer {
            padding: 12px 30px;
            font-weight: 800;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .btn-prev {
            border: 2px solid #212529;
            color: #212529;
            background: transparent;
        }

        .btn-prev:hover {
            background: #212529;
            color: white;
        }

        .btn-save-next {
            background-color: var(--primary-blue);
            color: white;
            border: none;
        }

        .btn-save-next:hover {
            background-color: #0b5ed7;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(13, 110, 253, 0.2);
        }

        /* Mobile Viewports */
        @media (max-width: 768px) {
            .sidebar-navigator { display: none; }
            .question-area { padding: 20px; }
            .sticky-footer { padding: 12px 20px; }
        }
    </style>
</head>
<body>

<!-- 1. Top Header -->
<header class="top-header">
    <div class="student-badge">
        🎓 <span th:text="${session.loggedInStudent} + ' (' + ${session.loggedInStudent} + ')'">23CS001 (23CS001)</span>
    </div>
    <div id="timerDisplay" class="pill-timer">⏱️ 00:00:00</div>
</header>

<!-- 2. Secondary Info Bar -->
<div class="info-bar">
    <div class="info-item"><i class="fas fa-book"></i> Subject: <span th:text="${exam.subject}">DS</span></div>
    <div class="info-item"><i class="fas fa-graduation-cap"></i> Semester: <span th:text="${student != null && student.semester != null ? student.semester : '1'}">1</span></div>
    <div class="info-item"><i class="fas fa-file-alt"></i> Exam: <span th:text="${exam.examName != null ? exam.examName : 'DS'}">DS</span></div>
</div>

<!-- 3. Main Layout Grid -->
<div class="main-wrapper">
    <!-- Left Column (Sidebar) -->
    <aside class="sidebar-navigator">
        <div class="navigator-card">
            <div class="navigator-header">
                Exam Navigator
                <i class="fas fa-filter text-muted"></i>
            </div>
            <nav class="section-list">
                <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{'/student/exam/section/' + ${i}}" 
                       class="section-item"
                       th:classappend="${i == currentIndex ? 'section-active' : 'section-inactive'}">
                        <span th:text="'Section ' + (${i + 1})">Section 1</span>
                        <i th:class="${i == currentIndex ? 'fas fa-hourglass-half' : 'fas fa-times'}"></i>
                    </a>
                </th:block>
            </nav>
        </div>
    </aside>

    <!-- Right Column (Question Area) -->
    <main class="question-area">
        <div class="area-top-bar">
            <div th:text="'Section ' + (${currentIndex + 1}) + ' of ' + ${totalPages}">Section 1 of 5</div>
            <div class="text-primary" th:text="(${ (currentIndex + 1) * 100 / totalPages }) + '% Completed'">0% Completed</div>
        </div>

        <div class="question-card">
            <!-- Card Header -->
            <div class="purple-banner">
                <i class="fas fa-layer-group"></i>
                <span th:text="'Q' + (${currentIndex + 1})">Q1</span>
            </div>

            <!-- Questions List -->
            <div th:each="q, iterStat : ${section.questions}" class="question-item">
                <div class="q-num-badge" th:text="${iterStat.count}">1</div>
                <div class="question-text">
                    <span th:if="${q.optional}" class="badge bg-warning text-dark me-2">OR</span>
                    <span th:text="${q.text}">Give any two examples of data structure.</span>
                </div>
                
                <div class="d-flex justify-content-between align-items-center">
                    <div class="badge-pill type-cyan">
                        ✏️ <span th:text="${q.marks > 2 ? 'Long Answer' : 'Short Answer'}">Short Answer</span>
                    </div>
                    <div class="badge-pill marks-yellow">
                        (<span th:text="${q.marks}">1.0</span> Marks)
                    </div>
                </div>

                <!-- Input Area (Only for first question or based on some logic) -->
                <textarea class="answer-textarea answer-area" 
                          th:attr="data-qid=${q.id}" 
                          placeholder="Type your detailed answer here. Your progress is automatically saved..." 
                          th:text="${savedAnswers != null && savedAnswers.containsKey(q.id) ? savedAnswers.get(q.id) : ''}"></textarea>
                
                <div class="d-flex justify-content-between align-items-center mt-2">
                    <div class="char-helper" th:id="'char-count-' + ${q.id}">0 characters</div>
                    <div class="char-helper text-success" th:id="'status-' + ${q.id}"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 4. Sticky Bottom Footer -->
<footer class="sticky-footer">
    <button type="button" class="btn-footer btn-prev" 
            th:disabled="${currentIndex == 0}"
            onclick="navigateSection('prev')">
        <i class="fas fa-arrow-left me-2"></i> PREVIOUS
    </button>

    <button th:if="${currentIndex < totalPages - 1}" 
            type="button" class="btn-footer btn-save-next" 
            onclick="navigateSection('next')">
        SAVE & NEXT <i class="fas fa-arrow-right ms-2"></i>
    </button>
    
    <button th:if="${currentIndex == totalPages - 1}" 
            type="button" class="btn-footer btn-save-next" 
            style="background-color: #198754;"
            onclick="confirmSubmit()">
        FINISH EXAM <i class="fas fa-check-circle ms-2"></i>
    </button>
</footer>

<!-- Logic & Metadata -->
<input type="hidden" id="attemptId" th:value="${attemptId}">
<input type="hidden" id="type" th:value="${type}">
<input type="hidden" id="remainingSeconds" th:value="${remainingSeconds}">
<input type="hidden" id="currentIndex" th:value="${currentIndex}">

<script>
    const attemptId = document.getElementById('attemptId').value;
    const type = document.getElementById('type').value;
    let remainingSeconds = parseInt(document.getElementById('remainingSeconds').value);
    const currentIndex = parseInt(document.getElementById('currentIndex').value);
    
    // Prevent leaving
    window.onbeforeunload = function() {
        if(remainingSeconds > 0 && !window.isNavigating) return "Exam in progress.";
    };

    // Auto-save
    setInterval(saveAllAnswers, 15000);

    document.querySelectorAll('.answer-area').forEach(textarea => {
        // Initial char count
        updateCharCount(textarea);

        textarea.addEventListener('input', function() {
            updateCharCount(this);
            debouncedSave(this.getAttribute('data-qid'), this.value);
        });
    });

    function updateCharCount(textarea) {
        const qid = textarea.getAttribute('data-qid');
        const helper = document.getElementById('char-count-' + qid);
        if(helper) helper.innerText = textarea.value.length + ' characters';
    }

    const debouncedSave = debounce((qid, val) => saveAnswer(qid, val), 3000);

    async function saveAllAnswers() {
        if(remainingSeconds <= 0) return;
        const promises = Array.from(document.querySelectorAll('.answer-area')).map(ta => 
            saveAnswer(ta.getAttribute('data-qid'), ta.value)
        );
        return Promise.all(promises);
    }

    async function saveAnswer(questionId, answer) {
        const statusEl = document.getElementById(`status-${questionId}`);
        try {
            const body = { questionId, answer };
            if (type === 'paper') body.submissionId = attemptId;
            else body.attemptId = attemptId;

            const response = await fetch('/api/answer/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if(statusEl && response.ok) {
                statusEl.innerHTML = '<i class="fas fa-check-circle me-1"></i> Auto-saved';
                setTimeout(() => { statusEl.innerHTML = ''; }, 3000);
            }
        } catch (error) { console.error(error); }
    }

    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }

    async function navigateSection(direction) {
        window.isNavigating = true;
        document.querySelectorAll('.btn-footer').forEach(btn => btn.disabled = true);
        await saveAllAnswers();
        let newIndex = direction === 'next' ? currentIndex + 1 : currentIndex - 1;
        window.location.href = `/student/exam/section/${newIndex}`;
    }

    function startTimer() {
        const display = document.getElementById('timerDisplay');
        const interval = setInterval(function () {
            if (remainingSeconds <= 0) {
                clearInterval(interval);
                display.innerText = "⏱️ 00:00:00";
                autoSubmitExam();
                return;
            }
            let hrs = Math.floor(remainingSeconds / 3600);
            let mins = Math.floor((remainingSeconds % 3600) / 60);
            let secs = remainingSeconds % 60;
            display.innerText = "⏱️ " +
                (hrs < 10 ? "0"+hrs : hrs) + ":" + 
                (mins < 10 ? "0"+mins : mins) + ":" + 
                (secs < 10 ? "0"+secs : secs);

            if (remainingSeconds <= 600) display.style.backgroundColor = "#dc3545";
            remainingSeconds--;
        }, 1000);
    }
    startTimer();

    function confirmSubmit() {
        if (confirm("Finish and submit your exam?")) submitExam();
    }

    function autoSubmitExam() {
        alert("Time is up!");
        submitExam();
    }

    async function submitExam() {
        window.isNavigating = true;
        document.querySelectorAll('.answer-area').forEach(ta => ta.disabled = true);
        await saveAllAnswers();
        try {
            const body = (type === 'paper') ? { submissionId: attemptId } : { attemptId: attemptId };
            const response = await fetch('/api/exam/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (response.ok) window.location.href = '/student/exam/feedback';
        } catch (e) { alert("Error."); }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
