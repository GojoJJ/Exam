<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .feedback-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
            border: 1px solid #e2e8f0;
        }
        .feedback-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .feedback-header h2 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 10px;
        }
        .feedback-header p {
            color: #64748b;
        }
        .form-label {
            font-weight: 600;
            color: #1e293b;
        }
        .rating-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .rating-group input[type="radio"] {
            display: none;
        }
        .rating-group label {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .rating-group input[type="radio"]:checked + label {
            background: #e0e7ff;
            border-color: #6366f1;
            color: #4f46e5;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            background-color: #3b82f6;
            border: none;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #2563eb;
        }
        .readonly-field {
            background-color: #f8fafc;
            border-color: #e2e8f0;
            color: #475569;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="feedback-card">
        <div class="feedback-header">
            <h2>Exam Feedback</h2>
            <p>Please share your experience to help us improve.</p>
        </div>

        <form action="/student/exam/feedback" method="post">
            
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" class="form-control readonly-field" th:value="${student != null && student.name != null ? student.name : 'Unknown Student'}" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label">Exam Name / Subject</label>
                <input type="text" class="form-control readonly-field" th:value="${examName}" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label">Overall Rating (1 - Poor, 5 - Excellent) <span class="text-danger">*</span></label>
                <div class="rating-group">
                    <input type="radio" id="star1" name="rating" value="1" required>
                    <label for="star1">1</label>
                    <input type="radio" id="star2" name="rating" value="2">
                    <label for="star2">2</label>
                    <input type="radio" id="star3" name="rating" value="3">
                    <label for="star3">3</label>
                    <input type="radio" id="star4" name="rating" value="4">
                    <label for="star4">4</label>
                    <input type="radio" id="star5" name="rating" value="5">
                    <label for="star5">5</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Was the exam system easy to use?</label>
                <select class="form-select" name="systemEasyToUse">
                    <option value="" disabled selected>Select an option</option>
                    <option value="Yes">Yes, very easy</option>
                    <option value="Neutral">Neutral</option>
                    <option value="No">No, difficult</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Was the question paper clear?</label>
                <select class="form-select" name="paperClear">
                    <option value="" disabled selected>Select an option</option>
                    <option value="Yes">Yes, absolutely</option>
                    <option value="Partially">Partially</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Any technical issues faced?</label>
                <input type="text" class="form-control" name="technicalIssues" placeholder="e.g., Slow loading, disconnected...">
            </div>

            <div class="mb-4">
                <label class="form-label">Additional Comments</label>
                <textarea class="form-control" name="comments" rows="3" placeholder="Tell us more about your experience..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-submit shadow-sm">Submit Feedback</button>
        </form>
    </div>

</body>
</html>
